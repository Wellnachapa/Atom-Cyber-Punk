<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAtom | Resultado Quiz</title>
    
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="stylesheet" href="./css/quiz.css">
    <link rel="icon" href="./assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
    
    <!--Importa chratjs-->
    <script src="https://cdn.jsdelivr.net/npm/chart.js@3.9.1/dist/chart.min.js"></script>
</head>

<body onload="validarSessao(); carregarResultado()">

    <nav>
        <a href="#" class="nav-logo">
            <div class="logo-cyber"></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="home">[ HOME ]</a></li>
            <li><a href="faq.html" class="faq">FAQ</a></li>
            <li><a href="login.html" class="login">LOGIN</a></li>
            <li><a href="cadastro.html" class="register">CADASTRO</a></li>
        </ul>
    </nav>

    <div class="dashboard-container">
        <h1 class="dashboard-titulo">RESULTADO FINAL</h1>
        <p class="dashboard-subtitulo">ANÁLISE DO SEU DESEMPENHO</p>

        <div class="resultado-geral">
            <h2 style="color: #00d4ff;">Desempenho no Quiz</h2>
            <div class="score-grande" id="acertos-totais">0/0</div>
            <div class="score-percentual" id="percentual-acertos">0%</div>
            <p style="color: #888; font-size: 1em;">Questões respondidas corretamente</p>
        </div>

        <div style="background: rgba(255, 215, 0, 0.05); padding: 20px; border-radius: 10px; margin-bottom: 30px;">
            <h3 style="color: #ffd700; text-align: center;">Seu Perfil S.P.E.C.I.A.L</h3>
            <div class="atributos-display" id="perfil-special-display">
            </div>
        </div>

        <!-- graficos -->
        <div class="graficos-grid">
            <div class="grafico-container">
                <h3 class="grafico-titulo">Seu S.P.E.C.I.A.L</h3>
                <div class="grafico">
                    <canvas id="graficoRadar"></canvas>
                </div>
            </div>

            <div class="grafico-container">
                <h3 class="grafico-titulo">Acertos vs Erros</h3>
                <div class="grafico">
                    <canvas id="graficoAcertos"></canvas>
                </div>
            </div>
        </div>

        <div class="botoes-finais">
            <button class="botao-acao" onclick="refazerQuiz()">
                Refazer Quiz
            </button>
            <button class="botao-acao botao-voltar" onclick="voltarHome()">
                Voltar ao Home
            </button>
        </div>
    </div>

    <footer class="footer-strip">
        <span class="blue">◈ CYBERPUNK 2077 © CD PROJEKT RED</span>
        <span>|</span>
        <span>CYBERATOM © 2026</span>
        <span>|</span>
        <span class="yellow">FALLOUT © BETHESDA SOFTWORKS ◈</span>
    </footer>

    <script src="./js/sessao.js"></script>

    <script>
        var perfilUsuario = {};      // SPECIAL do usuário
        var resultadoQuiz = {};      // resultado


        function carregarResultado() {
            //Pega o ID do usuário
        
            var urlParams = new URLSearchParams(window.location.search);
            var idUsuario = urlParams.get('usuarioId');

            console.log("ID do usuário recebido:", idUsuario);

            // Se não tem ID, redireciona
            if (idUsuario == null) {
                console.log("Erro: ID do usuário não encontrado!");
                document.querySelector('.dashboard-container').innerHTML = '<p style="color: #ff0000; text-align: center;">Erro ao carregar resultado!</p>';
                return;
            }

            //  pega o special e salva tipo um let ou var
            if (!sessionStorage.PERFIL_SPECIAL) {
                console.error("ERRO: PERFIL_SPECIAL não encontrado no sessionStorage");
                document.querySelector('.dashboard-container').innerHTML = '<p style="color: #ff0000; text-align: center;">Erro: Perfil SPECIAL não encontrado!</p>';
                return;
            }

            perfilUsuario = JSON.parse(sessionStorage.PERFIL_SPECIAL);
            console.log("Perfil SPECIAL recuperado:", perfilUsuario);

            // Mostra SPECIAL na tela
            mostrarPerfilSpecial();

            // buscar o resultado do quiz no servidor
            console.log("Iniciando busca do resultado...");
            fetch("/perguntas/resultado/" + idUsuario)
                .then(function(resposta) {
                    console.log("Resposta do servidor - Status:", resposta.status);
                    
                    if (!resposta.ok) {
                        throw new Error("Erro HTTP: " + resposta.status);
                    }
                    
                    return resposta.json();
                })
                .then(function(dados) {
                    console.log("Resultado recebido do servidor:", dados);

                    if (!dados) {
                        throw new Error("Dados vazios recebidos do servidor");
                    }

                    // guardar o resultado
                    resultadoQuiz = dados;

                    // validar os dados
                    var opcoesCertas = dados.opcoes_certas || 0;
                    var totalOpcoes = dados.total_opcoes || 0;

                    if (totalOpcoes === 0) {
                        throw new Error("Total de opções é zero!");
                    }

                    // números de acertos/erros
                    document.getElementById('acertos-totais').textContent = opcoesCertas + '/' + totalOpcoes;

                    // percentual
                    var percentual = Math.round((opcoesCertas / totalOpcoes) * 100);
                    document.getElementById('percentual-acertos').textContent = percentual + '%';

                    console.log("Acertos:", opcoesCertas);
                    console.log("Total:", totalOpcoes);
                    console.log("Percentual:", percentual);

                    setTimeout(function() {
                        console.log("Criando gráficos...");
                        criarGraficoRadar();
                        criarGraficoAcertos(opcoesCertas, totalOpcoes - opcoesCertas);
                    }, 100);
                })
                .catch(function(erro) {
                    console.error("ERRO ao buscar resultado:", erro);
                    console.error("Stack:", erro.stack);
                    document.querySelector('.dashboard-container').innerHTML += '<p style="color: #ff0000; text-align: center;">Erro ao carregar resultado: ' + erro.message + '</p>';
                });
        }


        // Peril especial
        function mostrarPerfilSpecial() {
            
            var atributos = [
                { nome: 'S', label: 'Strength', valor: perfilUsuario.strength },
                { nome: 'P', label: 'Perception', valor: perfilUsuario.perception },
                { nome: 'E', label: 'Endurance', valor: perfilUsuario.endurance },
                { nome: 'C', label: 'Charisma', valor: perfilUsuario.charisma },
                { nome: 'I', label: 'Intelligence', valor: perfilUsuario.intelligence },
                { nome: 'A', label: 'Agility', valor: perfilUsuario.agility },
                { nome: 'L', label: 'Luck', valor: perfilUsuario.luck }
            ];

            var html = '';

            // Para CADA atributo, criar um card
            for (var i = 0; i < atributos.length; i++) {
                var attr = atributos[i];
                html += '<div class="atributo-card">';
                html += '<div class="atributo-nome-small">' + attr.nome + ' - ' + attr.label + '</div>';
                html += '<div class="atributo-valor-small">' + attr.valor + '</div>';
                html += '</div>';
            }

            document.getElementById('perfil-special-display').innerHTML = html;
        }


        // Grafico 1
        function criarGraficoRadar() {

            try {

                var canvasRadar = document.getElementById('graficoRadar');
                
                if (!canvasRadar) {
                    console.error("ERRO: Canvas com ID 'graficoRadar' não encontrado!");
                    return;
                }

                console.log("Canvas Radar encontrado:", canvasRadar);
                console.log("Canvas Radar dimensões:", canvasRadar.width, "x", canvasRadar.height);

                var ctx = canvasRadar.getContext('2d');

                if (!perfilUsuario || typeof perfilUsuario !== 'object') {
                    console.error("ERRO: Perfil do usuário inválido:", perfilUsuario);
                    return;
                }

                console.log("Dados do perfil:", perfilUsuario);

                var grafico = new Chart(ctx, {
                
                    type: 'radar',
                    
                    data: {

                        labels: ['Strength', 'Perception', 'Endurance', 'Charisma', 'Intelligence', 'Agility', 'Luck'],
                        
                        datasets: [{
                            label: 'S.P.E.C.I.A.L',
                            
                            data: [
    
                            parseInt(perfilUsuario.strength) || 1,
                            parseInt(perfilUsuario.perception) || 1,
                            parseInt(perfilUsuario.endurance) || 1,
                            parseInt(perfilUsuario.charisma) || 1,
                            parseInt(perfilUsuario.intelligence) || 1,
                            parseInt(perfilUsuario.agility) || 1,
                            parseInt(perfilUsuario.luck) || 1
                        ],
                            
                            backgroundColor: 'rgba(255, 215, 0, 0.3)',
                            
                            borderColor: '#ffd700',
                            
                            borderWidth: 2,
                        
                            pointBackgroundColor: '#00d4ff',
                            
                            pointBorderColor: '#ffd700',
                            
                            pointRadius: 5
                        }]
                    },
                    
                    options: {
                        // Responsivo = adapta ao tamanho da tela
                        responsive: true,
                        
                        // Manter proporção
                        maintainAspectRatio: false,
                        
                        // Configurações dos labels (nomes dos atributos)
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#ffd700',
                                    font: {
                                        size: 14
                                    }
                                }
                            }
                        },
                        
                        // Configuração da escala (de 0 a 10)
                        scales: {
                            r: {
                                // Mínimo: 0, Máximo: 10
                                min: 0,
                                max: 10,
                                
                                // Cor das linhas da grade
                                grid: {
                                    color: 'rgba(255, 215, 0, 0.1)'
                                },
                                
                                // Cor dos números da escala
                                ticks: {
                                    color: '#ffd700',
                                    display: false
                                },
                                
                                // Cor da linha da escala
                                scales: {
                                    r: {
                                        min: 0,
                                        max: 10,
                                        grid: {
                                            color: 'rgba(255, 215, 0, 0.1)'
                                        },
                                        ticks: {
                                            color: '#ffd700',
                                        
                                        },
                                        pointLabels: {
                                            color: '#ffd700',
                                             font: {
                                                size: 13,
                                                family: 'Arial'
                                            },
                                            callback: function(label) {
                                                return label;}
                                        }
                                    }
                                }
                            }
                        }
                    }
                });

                // Essas duas linhas VÊM AQUI, fora do Chart
                grafico.options.scales.r.pointLabels.color = '#ffd700';
                grafico.update();

                console.log("✓ Gráfico Radar criado com sucesso!");
            } catch (erro) {
                console.error("ERRO ao criar gráfico radar:", erro);
                console.error("Stack:", erro.stack);
            }
        }


        // ========== FUNÇÃO 4: CRIAR GRÁFICO DE COLUNAS (ACERTOS/ERROS) ==========
        function criarGraficoAcertos(acertos, erros) {
            // EXPLICAÇÃO DO GRÁFICO DE COLUNAS:
            // Mostra duas colunas:
            // - Uma azul para ACERTOS
            // - Uma vermelha para ERROS

            try {
                // PASSO 1: Pegar o contexto do canvas
                var canvasAcertos = document.getElementById('graficoAcertos');
                
                if (!canvasAcertos) {
                    console.error("ERRO: Canvas com ID 'graficoAcertos' não encontrado!");
                    return;
                }

                console.log("Canvas Acertos encontrado:", canvasAcertos);
                console.log("Dados - Acertos:", acertos, "Erros:", erros);

                var ctx = canvasAcertos.getContext('2d');

                // PASSO 2: Criar um novo gráfico Chart.js
                var grafico = new Chart(ctx, {
                    // Tipo: 'bar' = gráfico de colunas
                    type: 'bar',
                    
                    data: {
                        // Labels = apenas um (o nome do eixo X)
                        labels: ['Resultado'],
                        
                        datasets: [
                            {
                                // Primeira coluna = ACERTOS
                                label: 'Acertos',
                                data: [acertos],
                                backgroundColor: 'rgba(0, 255, 0, 0.7)',  // Verde
                                borderColor: '#00ff00',
                                borderWidth: 2
                            },
                            {
                                // Segunda coluna = ERROS
                                label: 'Erros',
                                data: [erros],
                                backgroundColor: 'rgba(255, 0, 0, 0.7)',  // Vermelho
                                borderColor: '#ff0000',
                                borderWidth: 2
                            }
                        ]
                    },
                    
                    options: {
                        // Responsivo
                        responsive: true,
                        maintainAspectRatio: false,
                        
                        // Configurações dos labels
                        plugins: {
                            legend: {
                                labels: {
                                    color: '#ffd700',
                                    font: {
                                        size: 14
                                    }
                                }
                            }
                        },
                        
                        // Configuração dos eixos
                        scales: {
                            x: {
                                // Cor dos labels do eixo X
                                ticks: {
                                    color: '#ffd700'
                                },
                                // Cor da grid
                                grid: {
                                    color: 'rgba(255, 215, 0, 0.1)'
                                }
                            },
                            y: {
                                // Começar do 0
                                beginAtZero: true,
                                
                                // Cor dos labels do eixo Y
                                ticks: {
                                    color: '#ffd700'
                                },
                                
                                // Cor da grid
                                grid: {
                                    color: 'rgba(255, 215, 0, 0.1)'
                                }
                            }
                        }
                    }
                });

                console.log("✓ Gráfico de Acertos criado com sucesso!");
            } catch (erro) {
                console.error("ERRO ao criar gráfico de acertos:", erro);
                console.error("Stack:", erro.stack);
            }
        }


        // ========== FUNÇÃO 5: REFAZER QUIZ ==========
        function refazerQuiz() {
            var urlParams = new URLSearchParams(window.location.search);
            var idUsuario = urlParams.get('usuarioId');

            if (!idUsuario) {
                alert('ID do usuário não encontrado. Faça login novamente para refazer o quiz.');
                return;
            }

            fetch('/perguntas/limpar/' + idUsuario, {
                method: 'DELETE'
            })
            .then(function(resposta) {
                if (!resposta.ok) {
                    throw new Error('Erro ao limpar respostas.');
                }
                return resposta.json();
            })
            .then(function(dados) {
                console.log('Respostas antigas removidas:', dados);
                window.location = './quiz.html';
            })
            .catch(function(erro) {
                console.error('Erro ao limpar respostas:', erro);
                alert('Não foi possível refazer o quiz. Tente novamente.');
            });
        }


        // ========== FUNÇÃO 6: VOLTAR HOME ==========
        function voltarHome() {
            // Volta para a página inicial
            window.location = "./index.html";
        }
    </script>

</body>

</html>
