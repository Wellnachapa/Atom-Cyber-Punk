<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CyberAtom | Login</title>
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="./css/estilo.css">
    <link rel="icon" href="./assets/icon/favicon2.ico">
    <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>
    <nav>
        <a href="#" class="nav-logo">
            <div class="logo-cyber"></div>
        </a>
        <ul class="nav-links">
            <li><a href="index.html" class="home">[ HOME ]</a></li>
            <li><a href="faq.html" class="faq">FAQ</a></li>
            <li><a href="login.html" class="login">LOGIN</a></li>
            <li><a href="cadastro.html" class="register">CADASTRO</a></li>
        </ul>
    </nav>

    <div class="cadastro-wrapper">
        <div class="cadastro-card">

            <div class="scanline"></div>

            <div class="atom-orbit-cadastro">
                <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <ellipse cx="50" cy="50" rx="45" ry="20" stroke="#ffd700" stroke-width="1.5"/>
                    <ellipse cx="50" cy="50" rx="45" ry="20" stroke="#ffd700" stroke-width="1.5" transform="rotate(60 50 50)"/>
                    <ellipse cx="50" cy="50" rx="45" ry="20" stroke="#ffd700" stroke-width="1.5" transform="rotate(120 50 50)"/>
                    <circle cx="50" cy="50" r="6" fill="#ffd700"/>
                </svg>
            </div>

            <p class="side-tag">Garanta o seu futuro hoje!</p>
            <h1 class="side-title glitch" data-text="LOGIN">LOGIN</h1>
            <p class="side-subtitle">// ENTRE PARA FAZER O NOSSO QUIZ!</p>

            <div class="divider-cadastro"></div>

            <div class="card_erro" id="cardErro">
                <span id="mensagem_erro"></span>
            </div>

            <div class="formulario">
                <p class="side-tag" style="justify-content: center; margin-bottom: 20px;">Bem vindo de volta, samurai</p>
                <div class="campo">
                    <span>E-mail:</span>
                    <input id="email_input" type="text" placeholder="samurai@vault.com">
                </div>
                <div class="campo">
                    <span>Senha:</span>
                    <input id="senha_input" type="password" placeholder="******">
                </div>
                <button class="side-cta" onclick="entrar()">ENTRAR</button>
            </div>

            <div class="divider-cadastro"></div>
            <p class="login-link">Não possui uma conta? <a href="cadastro.html">→ CADASTRAR</a></p>

        </div>
    </div>

    <footer class="footer-strip">
        <span class="blue">◈ CYBERPUNK 2077 © CD PROJEKT RED</span>
        <span>|</span>
        <span>CYBERATOM © 2026</span>
        <span>|</span>
        <span class="yellow">FALLOUT © BETHESDA SOFTWORKS ◈</span>
    </footer>

<script>
    function emailValido(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function senhaValida(senha) {
        return senha.length >= 6;
    }

    function entrar() {
        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            mostrarErro("// ERRO: Todos os campos são obrigatórios.");
            return false;
        }

        if (!emailValido(emailVar)) {
            mostrarErro("// ERRO: Email inválido, samurai!");
            return false;
        }

        if (!senhaValida(senhaVar)) {
            mostrarErro("// ERRO: Senha precisa ter pelo menos 6 caracteres!");
            return false;
        }

        fetch(`/usuarios/autenticar?emailServer=${emailVar}&senhaServer=${senhaVar}`, {
            method: "GET"
        }).then(function (resposta) {
            if (resposta.ok) {
                resposta.json().then(json => {
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO  = json.nome;
                    sessionStorage.ID_USUARIO    = json.id;
                    window.location = "./quiz-especial.html";
                });
            } else {
                resposta.text().then(texto => mostrarErro("// ERRO: " + texto));
            }
        }).catch(() => mostrarErro("// ERRO: Sem conexão com o servidor."));

        return false;
    }

    function mostrarErro(msg) {
        cardErro.className = 'card_erro';
        mensagem_erro.innerHTML = msg;
        cardErro.style.display = "block";
        setTimeout(() => cardErro.style.display = "none", 5000);
    }
</script>
</body>
</html>
