<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>CyberAtom | Cadastro</title>

  <link rel="stylesheet" href="./css/estilo.css" />
  <link rel="icon" href="./assets/icon/favicon2.ico" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
</head>

<body>
  <!--Logo-->
  <nav>
    <a href="#" class="nav-logo">
      <div class="logo-cyber"></div>
    </a>
    <!--Navegação-->
    <ul class="nav-links">
      <li><a href="index.html" class="home">[ HOME ]</a></li>
      <li><a href="faq.html" class="faq">FAQ</a></li>
      <li><a href="login.html" class="login">LOGIN</a></li>
      <li><a href="cadastro.html" class="register">CADASTRO</a></li>
    </ul>
  </nav>
  
  <!--header inicio-->

  <div class="cadastro-wrapper">
    <div class="cadastro-card">

      <div class="scanline"></div>

      <div class="atom-orbit-cadastro">
        <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
          <ellipse cx="50" cy="50" rx="45" ry="20" stroke="#ffd700" stroke-width="1.5"/>
          <ellipse cx="50" cy="50" rx="45" ry="20" stroke="#ffd700" stroke-width="1.5" transform="rotate(60 50 50)"/>
          <ellipse cx="50" cy="50" rx="45" ry="20" stroke="#ffd700" stroke-width="1.5" transform="rotate(120 50 50)"/>
          <circle cx="50" cy="50" r="6" fill="#ffd700"/>
        </svg>
      </div>

      <p class="side-tag">Garanta o seu futuro hoje!</p>
      <h1 class="side-title glitch" data-text="CADASTRO">CADASTRO</h1>
      <p class="side-subtitle">// ENTRE PARA FAZER O NOSSO QUIZ!</p>


      <div class="divider-cadastro"></div>

      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>

      <div class="formulario">
      
        <div class="campo">
          <span>Nome:</span>
          <input id="nome_input" type="text" placeholder="Seu nome de samurai" />
        </div>
        <div class="campo">
          <span>E-mail:</span>
          <input id="email_input" type="text" placeholder="samurai@vault.com" />
        </div>
        <div class="campo">
          <span>Senha:</span>
          <input id="senha_input" type="password" placeholder="******" />
        </div>
        <div class="campo">
          <span>Confirmar Senha:</span>
          <input id="confirmacao_senha_input" type="password" placeholder="******" />
        </div>

        <button class="side-cta" onclick="cadastrar()">CADASTRAR</button>
      </div>

      <div class="divider-cadastro"></div>
      <p class="login-link">Já possui acesso? <a href="login.html">→ lOGIN</a></p>

      
    </div>
  </div>

<footer class="footer-strip">
    <span class="blue">◈ CYBERPUNK 2077 © CD PROJEKT RED</span>
    <span>|</span>
    <span>CYBERATOM © 2026</span>
    <span>|</span>
    <span class="yellow">FALLOUT © BETHESDA SOFTWORKS ◈</span>
  </footer>
  
  <script src="js/sessao.js"></script>
<script>
    function emailValido(email) {
        return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    function senhaValida(senha) {
        return senha.length >= 6;
    }

    function cadastrar() {
        var nomeVar             = nome_input.value;
        var emailVar            = email_input.value;
        var senhaVar            = senha_input.value;
        var confirmacaoSenhaVar = confirmacao_senha_input.value;

        if (!nomeVar || !emailVar || !senhaVar || !confirmacaoSenhaVar) {
            mostrarErro("Erro! Todos os campos são obrigatórios, bobão!");
            return false;
        }

        if (!emailValido(emailVar)) {
            mostrarErro("Erro! Email inválido, samurai!");
            return false;
        }

        if (!senhaValida(senhaVar)) {
            mostrarErro("Erro! A senha precisa ter pelo menos 6 caracteres!");
            return false;
        }

        if (senhaVar !== confirmacaoSenhaVar) {
            mostrarErro("Erro! As senhas não coincidem, digite certo!");
            return false;
        }

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                nomeServer: nomeVar,
                emailServer: emailVar,
                senhaServer: senhaVar
            }),
        })
        .then(resposta => {
            if (resposta.ok) {
                mostrarSucesso("Samurai registrado. Redirecionando...");
                setTimeout(() => window.location = "login.html", 2000);
            } else {
                mostrarErro("Erro! Samurai não é digno ainda! (Falha ao registrar)");
            }
        })
        .catch(() => mostrarErro("Erro! Sem conexão em Nightcity! (Servidor off)"));

        return false;
    }

    function mostrarErro(msg) {
        cardErro.className = 'card_erro';
        mensagem_erro.innerHTML = msg;
        cardErro.style.display = "block";
        setTimeout(() => cardErro.style.display = "none", 5000);
    }

    function mostrarSucesso(msg) {
        cardErro.className = 'card_erro success';
        mensagem_erro.innerHTML = msg;
        cardErro.style.display = "block";
    }
</script>
</body>
</html>
